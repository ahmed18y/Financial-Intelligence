<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Financial Intelligence</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>Financial Intelligence</h1>
      <p>Analysis Platform</p>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" name="username" class="form-input" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="form-group" style="margin-bottom:22px;">
        <label class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" autocomplete="current-password">
      </div>
      <div id="login-error" style="display:none;margin-bottom:14px;" class="alert alert-bad"></div>
      <button type="submit" class="btn btn-indigo" style="width:100%;justify-content:center;">Sign In</button>
    </form>
    <div style="margin-top:22px;padding-top:18px;border-top:1px solid var(--brd);">
      <div class="form-label" style="text-align:center;margin-bottom:10px;">Demo Accounts</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <button class="btn btn-outline btn-sm" onclick="fill('admin','admin123')" style="justify-content:center;font-family:var(--mono);font-size:0.7rem;">admin / admin123</button>
        <button class="btn btn-outline btn-sm" onclick="fill('analyst','analyst123')" style="justify-content:center;font-family:var(--mono);font-size:0.7rem;">analyst / analyst123</button>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
function fill(u,p){document.getElementById('username').value=u;document.getElementById('password').value=p;}
function toast(msg,type='info'){const t=document.getElementById('toast');const d=document.createElement('div');d.className=`toast-msg ${type}`;d.textContent=msg;t.appendChild(d);setTimeout(()=>d.remove(),3200);}
document.getElementById('login-form').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=e.target.querySelector('button[type=submit]');
  const err=document.getElementById('login-error');
  btn.disabled=true;btn.textContent='Signing in…';
  const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value})});
  const d=await res.json();
  if(d.ok){window.location.href=d.redirect||'/dashboard';}
  else{err.style.display='flex';err.textContent=d.msg||'Invalid credentials';btn.disabled=false;btn.textContent='Sign In';}
});
</script>
</body>
</html>
